# Visit https://github.com/lowlighter/metrics#-documentation for full reference
name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Блок 1 — основная статистика + календарь
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ivandemchenko01
          filename: metrics-stats.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Minsk
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # Блок 2 — языки (по коммитам, не по байтам)
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ivandemchenko01
          filename: metrics-languages.svg
          template: classic
          base: ""
          config_timezone: Europe/Minsk
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_indepth_custom_actors_limit: 100
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_details: percentage, bytes-size
          plugin_languages_other: yes
          plugin_languages_ignored: html, css, dockerfile

      # Блок 3 — достижения
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ivandemchenko01
          filename: metrics-achievements.svg
          template: classic
          base: ""
          config_timezone: Europe/Minsk
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
